services:
  # ─── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: synergy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-synergy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-synergy_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synergy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Cache ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: synergy-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── API Server ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: synergy-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-synergy}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-synergy_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Marketplace ─────────────────────────────────────────────────────────────
  marketplace:
    build:
      context: .
      dockerfile: apps/marketplace/Dockerfile
    container_name: synergy-marketplace
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXTAUTH_URL: ${NEXTAUTH_URL_MARKETPLACE:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET_MARKETPLACE}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:4000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  # ─── Seller Portal ────────────────────────────────────────────────────────────
  seller-portal:
    build:
      context: .
      dockerfile: apps/seller-portal/Dockerfile
    container_name: synergy-seller-portal
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXTAUTH_URL: ${NEXTAUTH_URL_SELLER:-http://localhost:3001}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET_SELLER}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:4000}
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy

  # ─── Platform HQ ──────────────────────────────────────────────────────────────
  platform-mgmt:
    build:
      context: .
      dockerfile: apps/platform-mgmt/Dockerfile
    container_name: synergy-platform-hq
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3002
      NEXTAUTH_URL: ${NEXTAUTH_URL_PLATFORM:-http://localhost:3002}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET_PLATFORM}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:4000}
    ports:
      - "3002:3002"
    depends_on:
      api:
        condition: service_healthy

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: synergy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - marketplace
      - seller-portal
      - platform-mgmt
      - api

volumes:
  postgres_data:
  redis_data:
