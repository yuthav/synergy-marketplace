events {
    worker_connections 1024;
}

http {
    # ─── Upstream services ─────────────────────────────────────────────────────
    upstream marketplace {
        server marketplace:3000;
    }

    upstream seller_portal {
        server seller-portal:3001;
    }

    upstream platform_hq {
        server platform-mgmt:3002;
    }

    upstream api {
        server api:4000;
    }

    # ─── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection      "1; mode=block";
    add_header Referrer-Policy       strict-origin-when-cross-origin;

    # ─── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ─── Marketplace → port 80 (default) ──────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # API
        location /api/ {
            proxy_pass         http://api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Marketplace (default route)
        location / {
            proxy_pass         http://marketplace;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }

    # ─── Seller Portal → port 3001 ────────────────────────────────────────────
    server {
        listen 3001;
        server_name _;

        location / {
            proxy_pass         http://seller_portal;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }

    # ─── Platform HQ → port 3002 ──────────────────────────────────────────────
    server {
        listen 3002;
        server_name _;

        location / {
            proxy_pass         http://platform_hq;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}
